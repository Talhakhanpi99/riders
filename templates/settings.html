<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VoiceRide Settings</title>
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <nav class="top-bar">
        <div>
          <p class="eyebrow">Preferences</p>
          <h1>Settings</h1>
        </div>
        <a href="/">Home</a>
      </nav>
      <form class="settings-form" id="settingsForm">
        <label>Language <select name="language"><option value="mixed">Mixed</option><option value="english">English</option><option value="urdu">Urdu</option><option value="hindi">Hindi</option></select></label>
        <label>Voice <select name="voice"><option value="default">Default</option><option value="calm">Calm</option><option value="clear">Clear</option></select></label>
        <label>Speech Speed <input name="speech_speed" type="range" min="0.7" max="1.3" step="0.1"></label>
        <label>Wake Word <input name="wake_word" type="text"></label>
        <label>Wake Timeout <input name="wake_timeout_seconds" type="number" min="2" max="15" step="1"></label>
        <label>Wake Signal <select name="wake_feedback_mode"><option value="screen_flash">Screen Flash</option><option value="torch_blink">Torch Blink</option><option value="vibrate">Vibrate</option><option value="sound">Sound</option></select></label>
        <label class="toggle"><input name="confirm_before_call" type="checkbox"> Confirm Before Calls</label>
        <label class="toggle"><input name="confirm_before_message" type="checkbox"> Confirm Before Messages</label>
        <label class="toggle"><input name="voice_profile_enabled" type="checkbox"> Voice Profile</label>
        <label class="toggle"><input name="voice_training_complete" type="checkbox"> Voice Training Complete</label>
        <label class="toggle"><input name="offline_mode" type="checkbox"> Offline Mode</label>
        <label class="toggle"><input name="cloud_mode" type="checkbox"> Cloud Mode</label>
        <label>Theme <select name="theme"><option value="dark">Dark</option><option value="light">Light</option></select></label>
        <button class="primary-action" type="submit">Save Settings</button>
      </form>
      <section class="response-panel">
        <h2>Permissions</h2>
        <div id="permissionsList" class="permission-list"></div>
      </section>
    </main>
    <script src="/static/js/settings.js"></script>
  </body>
</html>
